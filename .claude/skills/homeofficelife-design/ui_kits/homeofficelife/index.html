<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HomeOfficeLife · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['Space Grotesk', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        sans: ['DM Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
      },
    },
  },
};
</script>
<style>
  * { margin:0; box-sizing: border-box; }
  body { font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes pulse { 0%{opacity:1} 50%{opacity:.5} 100%{opacity:1} }
  @keyframes ping { 75%,100%{transform:scale(2);opacity:0} }
  .animate-ping { animation: ping 1s cubic-bezier(0,0,0.2,1) infinite; }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="AnaliseIA.jsx"></script>
<script type="text/babel" src="Galeria.jsx"></script>
<script type="text/babel" src="Loja.jsx"></script>
<script type="text/babel" src="PremiumCTA.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Categorias.jsx"></script>
<script type="text/babel" src="Kits.jsx"></script>
<script type="text/babel" src="DiagnosticoCompleto.jsx"></script>

<script type="text/babel">
const { useState, useCallback } = React;

const PAGES = [
  { id: "home",         label: "Home" },
  { id: "diagnostico",  label: "Resultado IA" },
  { id: "pricing",      label: "Planos" },
  { id: "categorias",   label: "Categorias" },
  { id: "kits-page",    label: "Kits" },
];

function App() {
  const [page, setPage] = useState("home");
  const [uploadedSrc, setUploadedSrc] = useState(null);
  const [user, setUser] = useState(null);

  const handleUpload = useCallback((src) => {
    setUploadedSrc(src);
    setPage("home");
    setTimeout(() => {
      const el = document.getElementById("diagnostico");
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 200);
  }, []);

  const handleReset = useCallback(() => setUploadedSrc(null), []);

  const handleNav = useCallback((id) => {
    if (id === "entrar") {
      setUser({ email: "ana@homeoffice.life" });
      return;
    }
    if (id === "premium") { setPage("pricing"); window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    if (id === "kits")    { setPage("kits-page"); window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    if (id === "home") { setPage("home"); window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    // in-page scroll for home sub-sections
    setPage("home");
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  }, []);

  return (
    <div style={{ minHeight: "100vh", background: "var(--background)" }}>
      <Navbar user={user} onSignOut={() => setUser(null)} onNav={handleNav} current={null}/>

      {/* Page tabs */}
      <div className="sticky top-16 z-30 border-b border-[var(--border)] bg-[var(--background)]/95 backdrop-blur-md">
        <div className="mx-auto flex max-w-[1200px] gap-1 overflow-x-auto px-6 py-1.5">
          {PAGES.map(p => (
            <button key={p.id} onClick={() => { setPage(p.id); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                    className={
                      "flex-shrink-0 rounded-full px-4 py-1.5 text-xs font-semibold transition-colors duration-200 " +
                      (page === p.id
                        ? "bg-[var(--foreground)] text-[var(--background)]"
                        : "text-[var(--muted-foreground)] hover:bg-[var(--secondary)] hover:text-[var(--foreground)]")
                    }>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      <main>
        {page === "home" && (
          <>
            <Hero onUpload={handleUpload} onExplore={() => handleNav("galeria")}/>
            <AnaliseIA uploadedSrc={uploadedSrc} onReset={handleReset}/>
            <Galeria/>
            <Loja/>
            <PremiumCTA onPremium={() => setPage("pricing")} onTry={() => handleUpload("../../assets/hero-setup.webp")}/>
            <Footer/>
          </>
        )}
        {page === "diagnostico" && (
          <DiagnosticoCompleto
            imageSrc="../../assets/hero-setup.webp"
            onUpgrade={() => setPage("pricing")}
            onBack={() => setPage("home")}
          />
        )}
        {page === "pricing" && (
          <>
            <Pricing onSelect={(name) => alert("Selecionado: " + name)}/>
            <Footer/>
          </>
        )}
        {page === "categorias" && (
          <>
            <Categorias onSelect={(id) => alert("Categoria: " + id)}/>
            <Footer/>
          </>
        )}
        {page === "kits-page" && (
          <>
            <Kits onSelect={(k) => alert("Kit: " + k.name)}/>
            <Footer/>
          </>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
