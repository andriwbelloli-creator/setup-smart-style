<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Type · Display Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px 26px; background: var(--brand-cream-50); }
  .row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .row:last-child { border-bottom: 0; }
  .demo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.025em; line-height: 1.05; color: var(--brand-ink-900); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--brand-ink-600); white-space: nowrap; }
</style></head>
<body>
  <div class="row"><div class="demo" style="font-size: 49px;">Nota do seu setup</div><div class="meta">h2 · 49 / 54 · Space Grotesk 700</div></div>
  <div class="row"><div class="demo" style="font-size: 31px;">Inspiração brasileira</div><div class="meta">h3 · 31 / 36 · 700</div></div>
  <div class="row"><div class="demo" style="font-size: 20px;">Section title</div><div class="meta">h6 · 20 / 24 · 700</div></div>
</body></html>
