<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px 26px; background: var(--brand-cream-50); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 14px; padding: 6px 0; }
  .bar { background: var(--brand-coral-500); height: 14px; border-radius: 4px; }
  .nm { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--brand-ink-900); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--brand-ink-600); text-align: right; }
</style></head>
<body>
  <div class="row"><div class="nm">space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 · 0.25rem</div></div>
  <div class="row"><div class="nm">space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 · 0.5rem</div></div>
  <div class="row"><div class="nm">space-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12 · 0.75rem</div></div>
  <div class="row"><div class="nm">space-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 · 1rem</div></div>
  <div class="row"><div class="nm">space-6</div><div><div class="bar" style="width:24px"></div></div><div class="px">24 · 1.5rem</div></div>
  <div class="row"><div class="nm">space-8</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 · 2rem</div></div>
  <div class="row"><div class="nm">space-12</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 · 3rem</div></div>
  <div class="row"><div class="nm">space-20</div><div><div class="bar" style="width:80px"></div></div><div class="px">80 · 5rem</div></div>
</body></html>
