<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Components · Empty States</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; background: var(--brand-cream-50); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .empty { border-radius: 22px; border: 2px dashed var(--border); background: var(--card); padding: 32px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .icon { width:48px; height:48px; border-radius:16px; background: oklch(0.42 0.07 195 / 0.1); display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
  h3 { font-family: var(--font-display); font-weight:700; font-size:16px; color: var(--brand-ink-900); margin:0; }
  p { font-size:12px; color: var(--brand-ink-600); margin:0; max-width:260px; }
  .btn { height:34px; padding: 0 16px; border-radius: 10px; border:none; font-family:var(--font-sans); font-weight:600; font-size:12px; cursor:pointer; margin-top:8px; display:inline-flex; align-items:center; gap:6px; }
  .btn.hero { background: var(--gradient-hero); color: white; box-shadow: var(--shadow-soft); }
  .btn.out { background: var(--card); color: var(--foreground); border: 1px solid var(--border); }
</style></head>
<body>
  <div class="empty">
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>
    <h3>Seja o primeiro a anunciar</h3>
    <p>Mesa, monitor ou cadeira parada? Coloque a venda.</p>
    <button class="btn hero">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Anunciar agora
    </button>
  </div>
  <div class="empty">
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <h3>Nenhum favorito ainda</h3>
    <p>Salve setups e produtos que gostar para acessar depois.</p>
    <button class="btn out">Explorar galeria</button>
  </div>
</body></html>
