<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Components · Level Badges</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; background: var(--brand-cream-50); font-family: var(--font-sans); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding: 6px 14px; border-radius: 999px; font-weight:700; font-size:13px; }
  .score { font-family: var(--font-display); font-size:18px; font-weight:800; }
  .b1 { background: oklch(0.6 0.22 27 / 0.12); color: oklch(0.6 0.22 27); }
  .b2 { background: oklch(0.72 0.15 75 / 0.12); color: oklch(0.55 0.12 75); }
  .b3 { background: oklch(0.42 0.07 195 / 0.12); color: oklch(0.42 0.07 195); }
  .b4 { background: oklch(0.6 0.13 155 / 0.12); color: oklch(0.5 0.12 155); }
  .b5 { background: oklch(0.72 0.18 35 / 0.12); color: oklch(0.62 0.18 35); }
  .star { width:12px; height:12px; }
</style></head>
<body>
  <div class="badge b1"><span class="score">25</span> Básico</div>
  <div class="badge b2"><span class="score">45</span> Bom</div>
  <div class="badge b3"><span class="score">65</span> Otimizado</div>
  <div class="badge b4"><span class="score">82</span> Profissional</div>
  <div class="badge b5"><span class="score">95</span> Setup dos sonhos</div>
</body></html>
