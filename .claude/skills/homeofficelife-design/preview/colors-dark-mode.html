<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Colors · Dark Mode</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; display: grid; grid-template-columns: 1fr 1fr; }
  .half { padding:22px; font-family: var(--font-sans); }
  .light { background: var(--brand-cream-50); }
  .dark-panel { background: oklch(0.16 0.02 200); }
  .dark-panel .card, .dark-panel .nm, .dark-panel .hex { color: oklch(0.96 0.015 85); }
  .dark-panel .muted { color: oklch(0.7 0.025 85); }
  .dark-panel .card { background: oklch(0.21 0.025 200); border-color: oklch(1 0 0 / 12%); }
  .card { border-radius: 16px; border: 1px solid var(--border); background: var(--card); padding: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing:.08em; margin-bottom:12px; }
  .light .lbl { color: var(--brand-ink-600); }
  .dark-panel .lbl { color: oklch(0.65 0.13 180); }
  .nm { font-family: var(--font-display); font-weight:700; font-size:18px; color: var(--brand-ink-900); letter-spacing:-0.02em; }
  .muted { font-size:13px; color: var(--brand-ink-600); margin-top:2px; }
  .hex { font-family: var(--font-mono); font-size:10px; margin-top:4px; color: var(--brand-ink-600); }
  .row { display:flex; gap:6px; margin-top:10px; }
  .sw { width:28px; height:28px; border-radius:8px; }
  .btn { height:32px; padding: 0 14px; border-radius: 8px; border:none; font-family: var(--font-sans); font-size:12px; font-weight:600; cursor:pointer; margin-top:10px; display:flex; align-items:center; gap:6px; }
  .light .btn { background: oklch(0.42 0.07 195); color: oklch(0.98 0.012 85); }
  .dark-panel .btn { background: oklch(0.65 0.13 180); color: oklch(0.16 0.02 200); }
</style></head>
<body>
  <div class="half light">
    <div class="lbl">Light mode</div>
    <div class="card">
      <div class="nm">Nota do seu setup</div>
      <div class="muted">Envie uma foto e receba diagnóstico.</div>
      <div class="row">
        <div class="sw" style="background: oklch(0.42 0.07 195);"></div>
        <div class="sw" style="background: oklch(0.72 0.18 35);"></div>
        <div class="sw" style="background: oklch(0.62 0.09 55);"></div>
        <div class="sw" style="background: oklch(0.98 0.012 85); border:1px solid oklch(0.9 0.015 85);"></div>
      </div>
      <button class="btn">Avaliar setup</button>
    </div>
  </div>
  <div class="half dark-panel">
    <div class="lbl">Dark mode</div>
    <div class="card">
      <div class="nm">Nota do seu setup</div>
      <div class="muted">Envie uma foto e receba diagnóstico.</div>
      <div class="row">
        <div class="sw" style="background: oklch(0.65 0.13 180);"></div>
        <div class="sw" style="background: oklch(0.72 0.18 35);"></div>
        <div class="sw" style="background: oklch(0.72 0.09 55);"></div>
        <div class="sw" style="background: oklch(0.16 0.02 200); border:1px solid oklch(1 0 0 / 12%);"></div>
      </div>
      <button class="btn">Avaliar setup</button>
    </div>
  </div>
</body></html>
