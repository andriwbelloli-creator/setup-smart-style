<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--brand-cream-50); display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; align-items: center; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .word   { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; color: var(--brand-teal-900); }
  .word .life { font-weight: 500; }
  .panel  { background: var(--brand-teal-900); border-radius: 14px; padding: 22px; display: flex; align-items: center; justify-content: center; gap: 14px; height: 116px; }
  .panel .word { color: var(--brand-cream-50); }
</style>
</head>
<body>
  <div class="lockup">
    <!-- "h + sparkle" logo on cream -->
    <svg width="56" height="56" viewBox="0 0 40 40" role="img" aria-label="homeoffice.life">
      <path d="M9 7v25h5.5V21c0-3 1.8-5 4.5-5s4.5 2 4.5 5v11H29V20c0-5.5-3.6-9.2-8.8-9.2-2.4 0-4.5.9-5.7 2.4V7H9z" fill="var(--brand-teal-900)"/>
      <path d="M32 4.5l1.1 3.4 3.4 1.1-3.4 1.1L32 13.5l-1.1-3.4-3.4-1.1 3.4-1.1L32 4.5z" fill="var(--brand-coral-500)"/>
    </svg>
    <span class="word">homeoffice<span class="life">life</span></span>
  </div>
  <div class="panel">
    <svg width="42" height="42" viewBox="0 0 40 40">
      <path d="M9 7v25h5.5V21c0-3 1.8-5 4.5-5s4.5 2 4.5 5v11H29V20c0-5.5-3.6-9.2-8.8-9.2-2.4 0-4.5.9-5.7 2.4V7H9z" fill="#FFFFFF"/>
      <path d="M32 4.5l1.1 3.4 3.4 1.1-3.4 1.1L32 13.5l-1.1-3.4-3.4-1.1 3.4-1.1L32 4.5z" fill="#FFFFFF"/>
    </svg>
    <span class="word">homeoffice<span class="life">life</span></span>
  </div>
</body>
</html>
