<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Components · Hero Drop Zone</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px; background: var(--gradient-mesh), var(--brand-cream-50); font-family: var(--font-sans); }
  .wrap { position: relative; border-radius: 24px; overflow: hidden; border: 2px dashed oklch(0.42 0.07 195 / 0.4); aspect-ratio: 16/9; background: var(--card); }
  .wrap img { width:100%; height:100%; object-fit: cover; display:block; }
  .scrim { position:absolute; inset:0; background: oklch(0.18 0.025 200 / 0.45); display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 8px; }
  .bubble { background: rgba(255,255,255,.96); border-radius: 999px; padding: 14px; box-shadow: var(--shadow-elegant); }
  .bubble svg { display:block; }
  .h { font-family: var(--font-display); color: white; font-weight: 700; font-size: 20px; letter-spacing: -0.01em; }
  .s { color: rgba(255,255,255,.85); font-size: 12px; }
  .tag { position: absolute; left: 12px; top: 12px; background: rgba(255,255,255,.92); border-radius: 12px; padding: 6px 10px; backdrop-filter: blur(6px); font-size: 11px; box-shadow: var(--shadow-soft);}
  .tag .e { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--brand-ink-600); }
  .tag .t { font-weight: 700; color: var(--brand-ink-900); }
  .tag .p { color: var(--primary); font-weight: 600; }
  .score { position: absolute; right: 12px; bottom: 12px; background: rgba(255,255,255,.96); border-radius: 12px; padding: 8px 12px; backdrop-filter: blur(6px); box-shadow: var(--shadow-soft); }
  .score .e { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--brand-ink-600); }
  .score .n { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--brand-ink-900); line-height: 1; }
  .score .of { font-size: 12px; color: var(--brand-ink-600); }
</style></head>
<body>
  <div class="wrap">
    <img src="../assets/hero-setup.webp" alt=""/>
    <div class="scrim">
      <div class="bubble">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2A8E8E" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1.5" fill="#2A8E8E"/><path d="m21 15-3.5-3.5L11 18l-5-5L3 16"/></svg>
      </div>
      <div class="h">Solte sua foto ou clique</div>
      <div class="s">JPG, PNG ou WebP · até 10MB</div>
    </div>
    <div class="tag">
      <div class="e">Monitor</div>
      <div class="t">LG Ultrawide 34"</div>
      <div class="p">R$ 2.799 · Amazon BR</div>
    </div>
    <div class="score">
      <div class="e">Nota IA</div>
      <div class="n">8.7<span class="of">/10</span></div>
    </div>
  </div>
</body></html>
