<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Components · Loading IA</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; background: var(--brand-cream-50); font-family: var(--font-sans); display:flex; align-items:center; justify-content:center; }

  .loader { width:440px; max-width:100%; border-radius:24px; border:1px solid var(--border); background: var(--card); box-shadow: var(--shadow-elegant); overflow:hidden; text-align:center; padding: 36px 28px; position:relative; }

  .spinner { width:56px; height:56px; border-radius:50%; background: oklch(0.42 0.07 195 / 0.1); display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px; animation: breathe 2s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.8} }

  h3 { font-family: var(--font-display); font-weight:700; font-size:20px; color: var(--brand-ink-900); margin:0 0 6px; letter-spacing:-0.02em; }
  .sub { font-size:13px; color: var(--brand-ink-600); margin:0 0 20px; }

  .bar-track { height:6px; border-radius:999px; background: var(--brand-cream-100); overflow:hidden; margin-bottom:14px; }
  .bar-fill { height:100%; border-radius:999px; background: var(--gradient-hero); width:65%; animation: progress 3s ease-in-out infinite; }
  @keyframes progress { 0%{width:10%} 50%{width:75%} 100%{width:95%} }

  .steps { display:flex; flex-direction:column; gap:6px; text-align:left; }
  .step { display:flex; align-items:center; gap:8px; font-size:12px; color: var(--brand-ink-600); }
  .step.done { color: var(--brand-ink-900); }
  .step .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .step.done .dot { background: oklch(0.6 0.13 155); }
  .step.active .dot { background: var(--primary); animation: pulse 1.2s ease-in-out infinite; }
  .step.pending .dot { background: var(--border); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
  .step .check { font-size:10px; color: oklch(0.6 0.13 155); font-weight:800; }
</style></head>
<body>
  <div class="loader">
    <div class="spinner">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round">
        <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/>
      </svg>
    </div>
    <h3>Analisando seu setup…</h3>
    <div class="sub">Isso leva poucos segundos.</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="steps">
      <div class="step done"><span class="check">✓</span> Identificando ambiente</div>
      <div class="step done"><span class="check">✓</span> Analisando ergonomia</div>
      <div class="step active"><span class="dot"></span> Verificando iluminação</div>
      <div class="step pending"><span class="dot"></span> Avaliando organização</div>
      <div class="step pending"><span class="dot"></span> Montando plano de ação</div>
    </div>
  </div>
</body></html>
