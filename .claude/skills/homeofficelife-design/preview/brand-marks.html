<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Brand · Marks</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; background: var(--brand-cream-50); display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items:center; }
  .tile { aspect-ratio: 1/1; border-radius: 14px; display:flex; align-items:center; justify-content:center; }
  .tile.cream { background: var(--brand-cream-100); }
  .tile.teal  { background: var(--brand-teal-900); }
  .tile.coral { background: var(--brand-coral-500); }
  .tile.wood  { background: var(--brand-wood-500); }
  .label { font-family: var(--font-sans); font-size: 11px; color: var(--brand-ink-600); text-align:center; margin-top: 6px; letter-spacing: 0.04em; text-transform: uppercase; font-weight:600; }
  .cell { display:flex; flex-direction:column; }
</style></head>
<body>
  <div class="cell"><div class="tile cream">
    <svg width="64" height="64" viewBox="0 0 40 40"><path d="M9 7v25h5.5V21c0-3 1.8-5 4.5-5s4.5 2 4.5 5v11H29V20c0-5.5-3.6-9.2-8.8-9.2-2.4 0-4.5.9-5.7 2.4V7H9z" fill="#0E3D3F"/><path d="M32 4.5l1.1 3.4 3.4 1.1-3.4 1.1L32 13.5l-1.1-3.4-3.4-1.1 3.4-1.1L32 4.5z" fill="#F36458"/></svg>
  </div><div class="label">on cream</div></div>

  <div class="cell"><div class="tile teal">
    <svg width="64" height="64" viewBox="0 0 40 40"><path d="M9 7v25h5.5V21c0-3 1.8-5 4.5-5s4.5 2 4.5 5v11H29V20c0-5.5-3.6-9.2-8.8-9.2-2.4 0-4.5.9-5.7 2.4V7H9z" fill="#F7F5F0"/><path d="M32 4.5l1.1 3.4 3.4 1.1-3.4 1.1L32 13.5l-1.1-3.4-3.4-1.1 3.4-1.1L32 4.5z" fill="#F36458"/></svg>
  </div><div class="label">on teal</div></div>

  <div class="cell"><div class="tile coral">
    <svg width="64" height="64" viewBox="0 0 40 40"><path d="M9 7v25h5.5V21c0-3 1.8-5 4.5-5s4.5 2 4.5 5v11H29V20c0-5.5-3.6-9.2-8.8-9.2-2.4 0-4.5.9-5.7 2.4V7H9z" fill="#FFFFFF"/><path d="M32 4.5l1.1 3.4 3.4 1.1-3.4 1.1L32 13.5l-1.1-3.4-3.4-1.1 3.4-1.1L32 4.5z" fill="#FFFFFF"/></svg>
  </div><div class="label">mono on coral</div></div>

  <div class="cell"><div class="tile wood">
    <svg width="64" height="64" viewBox="0 0 40 40"><path d="M9 7v25h5.5V21c0-3 1.8-5 4.5-5s4.5 2 4.5 5v11H29V20c0-5.5-3.6-9.2-8.8-9.2-2.4 0-4.5.9-5.7 2.4V7H9z" fill="#FFFFFF"/><path d="M32 4.5l1.1 3.4 3.4 1.1-3.4 1.1L32 13.5l-1.1-3.4-3.4-1.1 3.4-1.1L32 4.5z" fill="#FFFFFF"/></svg>
  </div><div class="label">mono on wood</div></div>
</body></html>
