# Configuração do serviço no Render.
#
# IMPORTANTE — rebranding Deskly → HomeOfficeLife:
# Este `name` é o slug do serviço no Render. Mudá-lo aqui NÃO renomeia
# automaticamente um serviço já existente (render.yaml só vale na
# criação inicial). Pra renomear o serviço atual em produção:
#   1. Render Dashboard → seu serviço atual ("deskly") → Settings
#   2. "Service Name" → alterar pra "homeofficelife"
#   3. Salvar (URL onrender.com fallback muda também)
# O domínio customizado (homeofficelife.com.br) é configurado separadamente
# em Settings → Custom Domains, independente desse `name`.
services:
  - type: web
    name: homeofficelife
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      curl -fsSL https://bun.sh/install | bash
      export PATH=$HOME/.bun/bin:$PATH
      bun install
      bun run build
    startCommand: node start.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
