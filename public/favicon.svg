<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HomeOfficeLife">
  <title>HomeOfficeLife</title>

  <!-- Background tile: rounded square in teal (brand primary) -->
  <rect width="64" height="64" rx="14" fill="#0E3D3F"/>

  <!-- House silhouette in cream — outlined, scales clean to 16px -->
  <path d="M 14 30 L 32 14 L 50 30 L 50 50 L 14 50 Z"
        fill="none" stroke="#F7F5F0" stroke-width="4" stroke-linejoin="round"/>

  <!-- Coral accent dot — the "AI spark" marker -->
  <circle cx="46" cy="20" r="3.5" fill="#F36458"/>
</svg>
